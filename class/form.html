<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
        <label for="name">Name:</label>
        <input type="text" name="name" placeholder="Enter your name" id="name" required><br>
        <!--Email -->
        <label for="email">Email:</label>
        <input type="email" name="email" placeholder="Enter your email" id="email" required><br>

        <!--Password -->
        <label for="password">Password:</label>
        <input type="password" name="password" placeholder="Enter your password" minlength="8" id="password"><br>

        <!-- number input -->
        <label for="age">Age:</label>
        <input type="number" name="age" placeholder="Enter your age" id="age" min="18" max="100"><br>

        <!-- radio buttons -->
        <label for="gender">Gender:</label>
        <input type="radio" name="gender" value="male" id="male">
        <label for="male">Male</label>
        <input type="radio" name="gender" value="female" id="female">
        <label for="female">Female</label>
        <input type="radio" name="gender" value="other" id="other">
        <label for="other">Other</label><br>

        <!-- checkbox -->
        <p>Technologies</p>
        <input type="checkbox" name="html" value="html" id="html">
        <label for="html">HTML</label><br>
        <input type="checkbox" name="css" value="css" id="css">
        <label for="css">CSS</label><br>
        <input type="checkbox" name="javascript" value="javascript" id="javascript">
        <label for="javascript">JavaScript</label><br>

        <!-- dropdown -->
        <label for="country">Country:</label>
        <select name="country" id="country">
            <option value="india">India</option>
            <option value="usa">United States</option>
            <option value="uk">United Kingdom</option>
        </select><br>

        <!-- textarea -->
        <label for="message">Message:</label>
        <textarea name="message" id="message" placeholder="Please drop a message"></textarea><br>

        <!-- upload file -->
        <label for="resume">Upload Resume:</label>
        <input type="file" name="resume" id="resume"><br>

        <!-- date picker -->
        <label for="dob">Date of Birth:</label>
        <input type="date" name="dob" id="dob"><br>

        <button type="submit">Submit</button>
        <button type="reset">Reset</button>
    </form>
</body>
</html>
